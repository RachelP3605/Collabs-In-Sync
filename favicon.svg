<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Transparent background -->
  <rect width="200" height="200" fill="none"/>

  <!-- Blue S curve -->
  <path d="M 60 40 Q 100 40 100 70 Q 100 90 60 90 Q 20 90 20 110 Q 20 140 60 140 Q 100 140 100 160"
        fill="none" stroke="#0066ff" stroke-width="20" stroke-linecap="round"/>

  <!-- Orange S curve (bottom half) -->
  <path d="M 60 90 Q 20 90 20 110 Q 20 140 60 140 Q 100 140 100 160"
        fill="none" stroke="#ff6b35" stroke-width="20" stroke-linecap="round"/>

  <!-- Waveform bars -->
  <!-- Blue bars -->
  <rect x="50" y="55" width="6" height="20" fill="#0066ff" rx="1"/>
  <rect x="60" y="48" width="6" height="27" fill="#0066ff" rx="1"/>
  <rect x="70" y="52" width="6" height="23" fill="#0066ff" rx="1"/>

  <!-- Orange bars -->
  <rect x="50" y="110" width="6" height="20" fill="#ff6b35" rx="1"/>
  <rect x="60" y="103" width="6" height="27" fill="#ff6b35" rx="1"/>
  <rect x="70" y="107" width="6" height="23" fill="#ff6b35" rx="1"/>
</svg>
